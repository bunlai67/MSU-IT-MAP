<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แผนผังมหาวิทยาลัยมหาสารคาม</title>
<style>
  :root {
    --navy: #0b1d3a;
    --navy-deep: #050d1c;
    --gold: #e8b923;
    --gold-soft: #f3d97a;
    --cream: #f4f1ea;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--navy-deep);
    font-family: 'Segoe UI', 'Noto Sans Thai', sans-serif;
    color: var(--cream);
    min-height: 100vh;
  }

  header {
    padding: 28px 24px 18px;
    text-align: center;
    border-bottom: 1px solid rgba(232,185,35,0.25);
    background: linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
  }

  .eyebrow {
    letter-spacing: 0.3em;
    font-size: 11px;
    color: var(--gold-soft);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1 {
    margin: 0;
    font-size: clamp(22px, 4vw, 34px);
    font-weight: 700;
    color: var(--cream);
  }

  .sub {
    margin-top: 8px;
    color: rgba(244,241,234,0.6);
    font-size: 14px;
  }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 16px 60px;
  }

  .hint {
    text-align: center;
    margin-bottom: 18px;
    font-size: 14px;
    color: var(--gold-soft);
  }

  .hint strong { color: var(--gold); }

  .map-frame {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(232,185,35,0.3);
    box-shadow: 0 30px 60px rgba(0,0,0,0.5);
  }

  .map-frame img {
    display: block;
    width: 100%;
    height: auto;
  }

  /* The clickable hotspot for FAC IT, positioned proportionally over the map */
  .hotspot {
    position: absolute;
    left: 64.2%;
    top: 48.5%;
    width: 11%;
    height: 6.2%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    border-radius: 8px;
    background: rgba(232,185,35,0);
    border: 2px solid rgba(232,185,35,0);
    transition: all 0.25s ease;
    text-decoration: none;
  }

  .hotspot:hover,
  .hotspot:focus-visible {
    background: rgba(232,185,35,0.18);
    border-color: var(--gold);
    box-shadow: 0 0 0 6px rgba(232,185,35,0.12);
    outline: none;
  }

  .hotspot .pulse {
    position: absolute;
    inset: 0;
    border-radius: 8px;
    border: 2px solid var(--gold);
    opacity: 0;
    animation: pulse 2.4s ease-out infinite;
  }

  @keyframes pulse {
    0%   { opacity: 0.9; transform: scale(1); }
    100% { opacity: 0;   transform: scale(1.25); }
  }

  .legend {
    margin-top: 18px;
    text-align: center;
    font-size: 13px;
    color: rgba(244,241,234,0.55);
  }

  footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: rgba(244,241,234,0.35);
  }

  @media (prefers-reduced-motion: reduce) {
    .pulse { animation: none; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Mahasarakham University</div>
  <h1>แผนผังอาคาร มหาวิทยาลัยมหาสารคาม</h1>
  <div class="sub">เขตพื้นที่ขามเรียง — แตะที่ชื่ออาคารบนแผนที่เพื่อดูรายละเอียด</div>
</header>

<main>
  <div class="hint">ลองแตะที่ป้าย <strong>FAC IT</strong> บนแผนที่ด้านล่างดูสิ 👇</div>

  <div class="map-frame">
    <img src="campus-map.jpeg" alt="แผนผังมหาวิทยาลัยมหาสารคาม">
    <a href="fac-it.html" class="hotspot" aria-label="ไปยังหน้าคณะวิทยาการสารสนเทศ (FAC IT)">
      <span class="pulse"></span>
    </a>
  </div>

  <div class="legend">ตำแหน่งป้ายอ้างอิงจากภาพแผนที่จริง ปรับตำแหน่งได้ในไฟล์ index.html</div>
</main>

<footer>กลุ่ม Facebook เพื่อน้องใหม่ มมส. นิสิต มมส. ดูแล</footer>

</body>
</html>

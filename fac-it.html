<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAC IT — ว้าวมากนะ</title>
<style>
  :root {
    --navy: #0b1d3a;
    --navy-deep: #050d1c;
    --gold: #e8b923;
    --gold-soft: #f3d97a;
    --cream: #f4f1ea;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% 30%, var(--navy) 0%, var(--navy-deep) 70%);
    font-family: 'Segoe UI', 'Noto Sans Thai', sans-serif;
    color: var(--cream);
    text-align: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .back {
    position: absolute;
    top: 22px;
    left: 22px;
    color: var(--gold-soft);
    text-decoration: none;
    font-size: 14px;
    border: 1px solid rgba(232,185,35,0.4);
    padding: 8px 14px;
    border-radius: 999px;
    transition: background 0.2s ease;
  }
  .back:hover { background: rgba(232,185,35,0.12); }

  .eyebrow {
    letter-spacing: 0.35em;
    font-size: 12px;
    color: var(--gold-soft);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .wow {
    font-size: clamp(48px, 12vw, 110px);
    font-weight: 800;
    margin: 0;
    background: linear-gradient(180deg, var(--gold-soft), var(--gold));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1.1;
    animation: pop 0.6s cubic-bezier(.2,1.4,.4,1) both;
  }

  .desc {
    margin-top: 18px;
    font-size: 16px;
    color: rgba(244,241,234,0.65);
  }

  .badge {
    margin-top: 28px;
    display: inline-block;
    padding: 10px 20px;
    border: 1px solid rgba(232,185,35,0.35);
    border-radius: 999px;
    font-size: 13px;
    color: var(--gold-soft);
    letter-spacing: 0.05em;
  }

  @keyframes pop {
    0%   { opacity: 0; transform: scale(0.7) translateY(20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .wow { animation: none; }
  }
</style>
</head>
<body>

<a href="index.html" class="back">← กลับไปหน้าแผนที่</a>

<div class="eyebrow">คณะวิทยาการสารสนเทศ · FAC IT</div>
<h1 class="wow">ว้าวมากนะ</h1>
<p class="desc">คุณกดมาถูกตึกแล้ว ลองกลับไปดูตึกอื่นบนแผนที่ได้เลย</p>
<div class="badge">Mahasarakham University</div>

</body>
</html>
